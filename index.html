        <meta name="apple-mobile-web-app-title" content="Agenda Virtual" />

        <!-- Critical CSS inline para reducir FCP/LCP -->
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            html {
                font-family:
                    system-ui,
                    -apple-system,
                    BlinkMacSystemFont,
                    sans-serif;
                scroll-behavior: auto;
            }
            body {
                min-height: 100vh;
                min-height: 100dvh;
                background: hsl(36 31% 96%);
                color: hsl(8 42% 18%);
                -webkit-font-smoothing: antialiased;
            }
            #root {
                min-height: 100vh;
                min-height: 100dvh;
                display: flex;
                flex-direction: column;
            }
            /* Layout base */
            .flex {
                display: flex;
            }
            .flex-col {
                flex-direction: column;
            }
            .flex-1 {
                flex: 1;
            }
            .items-center {
                align-items: center;
            }
            .items-start {
                align-items: flex-start;
            }
            .justify-center {
                justify-content: center;
            }
            .justify-between {
                justify-content: space-between;
            }
            .gap-2 {
                gap: 0.5rem;
            }
            .gap-4 {
                gap: 1rem;
            }
            .gap-6 {
                gap: 1.5rem;
            }
            .space-y-4 > *:not(:last-child) {
                margin-bottom: 1rem;
            }
            /* LoginPage specific */
            .min-h-dvh {
                min-height: 100dvh;
            }
            .min-h-screen {
                min-height: 100vh;
            }
            .bg-gradient-to-br {
                background-image: linear-gradient(
                    135deg,
                    var(--tw-gradient-stops)
                );
            }
            .from-background {
                --tw-gradient-from: hsl(36 31% 96%);
                --tw-gradient-stops:
                    var(--tw-gradient-from), var(--tw-gradient-to, transparent);
            }
            .via-muted {
                --tw-gradient-stops:
                    var(--tw-gradient-from), hsl(33 20% 89%),
                    var(--tw-gradient-to, transparent);
            }
            .to-secondary {
                --tw-gradient-to: hsl(35 52% 86%);
            }
            .w-40 {
                width: 10rem;
            }
            .h-40 {
                height: 10rem;
            }
            .rounded-full {
                border-radius: 9999px;
            }
            .rounded-xl {
                border-radius: 0.75rem;
            }
            .rounded-lg {
                border-radius: 0.5rem;
            }
            .overflow-hidden {
                overflow: hidden;
            }
            .object-cover {
                object-fit: cover;
            }
            .object-contain {
                object-fit: contain;
            }
            .text-center {
                text-align: center;
            }
            .text-3xl {
                font-size: 1.875rem;
                line-height: 2.25rem;
            }
            .text-2xl {
                font-size: 1.5rem;
                line-height: 2rem;
            }
            .text-sm {
                font-size: 0.875rem;
                line-height: 1.25rem;
            }
            .text-xs {
                font-size: 0.75rem;
                line-height: 1rem;
            }
            .font-bold {
                font-weight: 700;
            }
            .font-semibold {
                font-weight: 600;
            }
            .font-medium {
                font-weight: 500;
            }
            .text-foreground {
                color: hsl(8 42% 18%);
            }
            .text-muted-foreground {
                color: hsl(36 16% 35%);
            }
            .text-primary {
                color: hsl(8 87% 24%);
            }
            .text-white {
                color: hsl(0 0% 100%);
            }
            .mb-2 {
                margin-bottom: 0.5rem;
            }
            .mb-4 {
                margin-bottom: 1rem;
            }
            .mb-6 {
                margin-bottom: 1.5rem;
            }
            .mb-8 {
                margin-bottom: 2rem;
            }
            .mt-1 {
                margin-top: 0.25rem;
            }
            .mt-2 {
                margin-top: 0.5rem;
            }
            .mt-4 {
                margin-top: 1rem;
            }
            .p-4 {
                padding: 1rem;
            }
            .p-6 {
                padding: 1.5rem;
            }
            .w-full {
                width: 100%;
            }
            .max-w-md {
                max-width: 28rem;
            }
            .max-w-xs {
                max-width: 20rem;
            }
            .mx-auto {
                margin-left: auto;
                margin-right: auto;
            }
            /* Card */
            .bg-card {
                background-color: hsl(0 0% 100%);
            }
            .bg-white {
                background-color: hsl(0 0% 100%);
            }
            .bg-muted {
                background-color: hsl(33 20% 89%);
            }
            .bg-secondary {
                background-color: hsl(35 52% 86%);
            }
            .border {
                border-width: 1px;
                border-style: solid;
            }
            .border-border {
                --tw-border-opacity: 1;
                border-color: hsl(34 28% 78%);
            }
            .shadow-lg {
                box-shadow:
                    0 10px 15px -3px rgb(0 0 0 / 0.1),
                    0 4px 6px -4px rgb(0 0 0 / 0.1);
            }
            /* Button base */
            .inline-flex {
                display: inline-flex;
            }
            .items-center {
                align-items: center;
            }
            .h-4 {
                height: 1rem;
            }
            .w-4 {
                width: 1rem;
            }
            .h-8 {
                height: 2rem;
            }
            .px-4 {
                padding-left: 1rem;
                padding-right: 1rem;
            }
            .py-2 {
                padding-top: 0.5rem;
                padding-bottom: 0.5rem;
            }
            .rounded-md {
                border-radius: 0.375rem;
            }
            /* DashboardLayout base */
            .sticky {
                position: sticky;
            }
            .fixed {
                position: fixed;
            }
            .absolute {
                position: absolute;
            }
            .relative {
                position: relative;
            }
            .inset-y-0 {
                top: 0;
                bottom: 0;
            }
            .inset-0 {
                top: 0;
                right: 0;
                bottom: 0;
                left: 0;
            }
            .left-0 {
                left: 0;
            }
            .top-0 {
                top: 0;
            }
            .right-0 {
                right: 0;
            }
            .bottom-0 {
                bottom: 0;
            }
            .z-40 {
                z-index: 40;
            }
            .z-30 {
                z-index: 30;
            }
            .z-50 {
                z-index: 50;
            }
            .w-64 {
                width: 16rem;
            }
            .h-full {
                height: 100%;
            }
            .h-16 {
                height: 4rem;
            }
            .border-b {
                border-bottom-width: 1px;
            }
            .border-r {
                border-right-width: 1px;
            }
            .bg-white {
                background-color: hsl(0 0% 100%);
            }
            .will-change-transform {
                will-change: transform;
            }
            /* Transitions */
            .transition-colors {
                transition-property: color, background-color, border-color;
                transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
                transition-duration: 150ms;
            }
            .transition-transform {
                transition-property: transform;
                transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
                transition-duration: 150ms;
            }
            /* Grid */
            .grid {
                display: grid;
            }
            .grid-cols-1 {
                grid-template-columns: repeat(1, minmax(0, 1fr));
            }
            @media (min-width: 768px) {
                .md\\:grid-cols-3 {
                    grid-template-columns: repeat(3, minmax(0, 1fr));
                }
            }
            @media (min-width: 1024px) {
                .lg\\:block {
                    display: block;
                }
                .lg\\:static {
                    position: static;
                }
                .lg\\:translate-x-0 {
                    transform: translateX(0);
                }
                .lg\\:p-8 {
                    padding: 2rem;
                }
                .lg\\:flex-row {
                    flex-direction: row;
                }
            }
            /* Hide on mobile by default */
            .hidden {
                display: none;
            }
            /* Skeleton */
            .skeleton {
                background: linear-gradient(
                    90deg,
                    hsl(34 28% 78%) 25%,
                    hsl(33 20% 89%) 50%,
                    hsl(34 28% 78%) 75%
                );
                background-size: 200% 100%;
                animation: skeleton-loading 1.5s infinite;
            }
            @keyframes skeleton-loading {
                0% {
                    background-position: 200% 0;
                }
                100% {
                    background-position: -200% 0;
                }
            }
            /* Logo gradient */
            .bg-gradient-to-r {
                background-image: linear-gradient(
                    to right,
                    var(--tw-gradient-stops)
                );
            }
            .from-primary {
                --tw-gradient-from: hsl(8 87% 24%);
                --tw-gradient-stops:
                    var(--tw-gradient-from), var(--tw-gradient-to, transparent);
            }
            .to-accent {
                --tw-gradient-to: hsl(356 66% 32%);
            }
            /* Touch optimization */
            .touch-manipulation {
                touch-action: manipulation;
                -webkit-tap-highlight-color: transparent;
            }
            /* Sidebar */
            .-translate-x-full {
                transform: translateX(-100%);
            }
            /* Content area */
            .layout-contained {
                max-width: 1280px;
                margin-left: auto;
                margin-right: auto;
                padding-left: 1rem;
                padding-right: 1rem;
            }
            @media (min-width: 640px) {
                .sm\\:px-6 {
                    padding-left: 1.5rem;
                    padding-right: 1.5rem;
                }
            }
        </style>
    </head>
