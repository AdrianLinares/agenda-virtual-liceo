name: Run Email Worker Cron (Cloudflare)

on:
  workflow_dispatch:

jobs:
  trigger-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare email worker
        env:
          # URL del Worker desplegado en Cloudflare
          # Ejemplo: https://agenda-virtual-email-worker.<tu-subdominio>.workers.dev
          WORKER_URL: ${{ secrets.CLOUDFLARE_WORKER_URL }}
          CRON_SECRET: ${{ secrets.SUPABASE_CRON_SECRET }}
        run: |
          if [ -z "$WORKER_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing CLOUDFLARE_WORKER_URL or SUPABASE_CRON_SECRET GitHub secrets"
            exit 1
          fi

          curl -sS -X POST "$WORKER_URL" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json"
